<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកាមេរ៉ាសុវត្ថិភាព ជំនាន់ភ្ជាប់ស្វ័យប្រវត្តពេញអេក្រង់</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        /* កំណត់ឱ្យពេញអេក្រង់ និងផ្ទៃខ្មៅងងឹត */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        /* វីដេអូពេញអេក្រង់កុំព្យូទ័រអូតូ */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            background: #000; 
            display: none; 
        }

        /* អក្សរបង្ហាញស្ថានភាពកណ្តាលអេក្រង់ */
        #status { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #2ac767; 
            font-weight: bold; 
            font-size: 22px; 
            text-align: center; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px 25px; 
            border-radius: 8px; 
            pointer-events: none;
        }

        /* ធ្វើឱ្យទូរសព្ទងងឹតឈឹងសន្សំថ្ម */
        .phone-stealth-mode { background: #000000 !important; }
        .phone-stealth-mode #pc-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="pc-ui">
        <div id="status">📡 កំពុងស្កែនស្វែងរក និងភ្ជាប់ទៅទូរសព្ទអូតូ...</div>
        <video id="view-video" autoplay playsinline muted></video>
    </div>

    <script>
        // បង្កើតឈ្មោះបន្ទប់ថ្មីស្រឡាងដើម្បីកុំឱ្យជាន់ប្រព័ន្ធចាស់ដែលគាំង
        const LIVE_ROOM_ID = 'hino-auto-secure-cam-2026';
        
        // ប្រព័ន្ធទម្លុះ Firewall របស់ Google ជួយឱ្យរកគ្នាឃើញអូតូ
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        };
        
        let peer = null;
        let currentCall = null; 
        let localStream = null;
        let isMobileDevice = false;

        window.onload = function() {
            isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobileDevice) {
                // កុំព្យូទ័រ
                runAsPC();
            } else {
                // ទូរសព្ទ
                document.body.classList.add('phone-stealth-mode');
                startCamera();
            }
        };

        // --- ផ្នែកកុំព្យូទ័រ (ទទួលរូបភាពអូតូ) ---
        function runAsPC() {
            if (peer) peer.destroy();
            peer = new Peer(LIVE_ROOM_ID, peerConfig);

            peer.on('call', (call) => {
                // បដិសេធការហៅត្រួតគ្នា បើមានការហៅចូលចាស់កំពុងដើរ
                if (currentCall) {
                    call.answer();
                    setTimeout(() => { call.close(); }, 500);
                    return;
                }

                call.answer();
                currentCall = call; 
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('status').style.display = 'none';
                    const video = document.getElementById('view-video');
                    video.style.display = 'block';
                    video.srcObject = remoteStream;
                    
                    // បញ្ជាឱ្យលេងអូតូភ្លាមៗ
                    video.play().catch(err => {
                        console.log("Autoplay restriction:", err);
                        // ករណីបើ Browser Chrome លើកុំព្យូទ័រទាមទារឱ្យប៉ះអេក្រង់មុន
                        document.getElementById('status').style.display = 'block';
                        document.getElementById('status').style.color = '#ff3333';
                        document.getElementById('status').innerText = "🛑 សូមចុចលើអេក្រង់កុំព្យូទ័រ ១ដង ដើម្បីបើករូបភាពអូតូ";
                        
                        document.body.onclick = () => {
                            video.play();
                            document.getElementById('status').style.display = 'none';
                        };
                    });
                });

                call.on('close', () => {
                    handleDisconnect();
                });
            });

            peer.on('error', (err) => {
                console.log("PC Peer Error, លោតភ្ជាប់ឡើងវិញអូតូ...", err);
                setTimeout(runAsPC, 2000);
            });
        }

        function handleDisconnect() {
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').style.color = '#2ac767';
            document.getElementById('status').innerText = "📭 ទូរសព្ទបានដាច់។ កំពុងរង់ចាំការភ្ជាប់ឡើងវិញអូតូ...";
            const video = document.getElementById('view-video');
            video.style.display = 'none';
            video.srcObject = null;
            currentCall = null; 
        }

        // --- ផ្នែកទូរសព្ទ (បាញ់រូបភាពអូតូ និងលាក់ខ្លួន) ---
        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC();
            })
            .catch((err) => {
                console.error("កាមេរ៉ាបិទសិទ្ធិ Permissions៖", err);
                // ព្យាយាមបើកឡើងវិញរាល់ ៥ វិនាទី បើអ្នកប្រើភ្លេចចុច Allow
                setTimeout(startCamera, 5000);
            });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 

            peer.on('open', (id) => {
                // ប្រព័ន្ធហៅទៅកុំព្យូទ័រអូតូ
                const call = peer.call(LIVE_ROOM_ID, localStream);
                if (call) {
                    currentCall = call;
                    call.on('close', () => {
                        currentCall = null;
                        setTimeout(connectToPC, 3000); // បើដាច់ ឱ្យហៅទៅរកកុំព្យូទ័រឡើងវិញអូតូ
                    });
                }
            });

            peer.on('error', (err) => {
                // បើមានបញ្ហាអ៊ីនធឺណិត ឱ្យព្យាយាមភ្ជាប់ទៅកុំព្យូទ័រឡើងវិញរៀងរាល់ ៤ វិនាទីអូតូ
                setTimeout(connectToPC, 4000);
            });
        }
    </script>
</body>
</html>
