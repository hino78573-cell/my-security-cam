<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកាមេរ៉ាមុខ សម្រាប់កុំព្យូទ័រ និងទូរសព្ទ</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #2d2d2d; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        video { width: 100%; max-width: 640px; background: #000; border-radius: 8px; margin-top: 15px; border: 2px solid #00bcbc; }
        #status { color: #ffc107; font-weight: bold; margin: 15px 0; font-size: 20px; }
        .device-badge { display: inline-block; padding: 6px 12px; background: #444; border-radius: 20px; font-size: 14px; margin-bottom: 10px; color: #aaa; }
        .btn-disconnect { background: #dc3545; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; width: 100%; }
        .btn-disconnect:hover { background: #c82333; }
    </style>
</head>
<body>

    <h2>ប្រព័ន្ធកាមេរ៉ាសុវត្ថិភាព (មើលឃើញលើកុំព្យូទ័រ ១០០%)</h2>
    
    <div class="container">
        <div id="device-type" class="device-badge">កំពុងពិនិត្យឧបករណ៍...</div>
        <div id="status">កំពុងចាប់ផ្តើមប្រព័ន្ធ...</div>
        
        <video id="view-video" autoplay playsinline muted></video>
        
        <button id="btn-close" class="btn-disconnect" onclick="disconnectPhone()">🛑 បិទកាមេរ៉ា (ដោះលែងប្រព័ន្ធ)</button>
    </div>

    <script>
        // 🛠️ ប្រើប្រាស់ ID ថ្មីប្លែកគេ ដើម្បីកុំឱ្យស្ទះជាមួយកូដចាស់ៗ
        const LIVE_ROOM_ID = 'hino-security-camera-system-2026';
        
        let peer = null;
        let currentCall = null; 
        let localStream = null;

        window.onload = function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobile) {
                document.getElementById('device-type').innerText = "💻 ឧបករណ៍៖ កុំព្យូទ័រ (អេក្រង់មើល)";
                document.getElementById('btn-close').style.display = 'none';
                runAsPC();
            } else {
                document.getElementById('device-type').innerText = "📱 ឧបករណ៍៖ ទូរសព្ទ (កាមេរ៉ាមុខ)";
                startCamera();
            }
        };

        // --- កូដសម្រាប់ កុំព្យូទ័រ (អ្នកចាំមើល) ---
        function runAsPC() {
            document.getElementById('status').innerText = "📡 រង់ចាំទូរសព្ទបាញ់វីដេអូមក...";
            if (peer) peer.destroy();
            
            // កុំព្យូទ័របើកទ្វាររង់ចាំតាមលេខ ROOM ថេរ
            peer = new Peer(LIVE_ROOM_ID);

            peer.on('call', (call) => {
                if (currentCall) {
                    call.answer();
                    setTimeout(() => { call.close(); }, 500);
                    return;
                }

                call.answer();
                currentCall = call; 
                document.getElementById('status').innerText = "✅ ភ្ជាប់ជោគជ័យ! កំពុងបង្ហាញរូបភាពនៅលើកុំព្យូទ័រ...";
                
                call.on('stream', (remoteStream) => {
                    const video = document.getElementById('view-video');
                    video.srcObject = remoteStream;
                    video.play().catch(e => console.log("Autoplay error:", e));
                });

                call.on('close', () => {
                    document.getElementById('status').innerText = "📭 ទូរសព្ទបានបិទការភ្ជាប់។ រង់ចាំឧបករណ៍បន្ទាប់...";
                    document.getElementById('view-video').srcObject = null;
                    currentCall = null; 
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                setTimeout(runAsPC, 2000);
            });
        }

        // --- កូដសម្រាប់ ទូរសព្ទ (អ្នកបាញ់កាមេរ៉ា) ---
        function startCamera() {
            document.getElementById('status').innerText = "🎥 កំពុងបើកកាមេរ៉ាមុខ...";
            
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" }, // បង្ហាញកាមេរ៉ាមុខ
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                const video = document.getElementById('view-video');
                video.srcObject = stream; // បង្ហាញលើទូរសព្ទដែរ

                connectToPC();
            })
            .catch((err) => {
                document.getElementById('status').innerText = "⚠️ មិនអាចបើកកាមេរ៉ាបានទេ! សូមពិនិត្យសិទ្ធិការអនុញ្ញាតកាមេរ៉ា។";
            });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(); 

            peer.on('open', (id) => {
                document.getElementById('status').innerText = "🔗 កំពុងទាក់ទង និងបាញ់វីដេអូទៅកុំព្យូទ័រ...";
                
                // ទូរសព្ទហៅទូរស័ព្ទផ្ទាល់ទៅកាន់ ID របស់កុំព្យូទ័រ
                const call = peer.call(LIVE_ROOM_ID, localStream);
                
                if (call) {
                    currentCall = call;
                    
                    // ឆែកមើលលទ្ធផលបើកុំព្យូទ័រទទួល
                    document.getElementById('status').innerText = "✅ បានបាញ់វីដេអូទៅកុំព្យូទ័រជោគជ័យ!";
                    
                    call.on('close', () => {
                        document.getElementById('status').innerText = "🔄 បានដាច់ការភ្ជាប់! កំពុងភ្ជាប់ឡើងវិញ...";
                        currentCall = null;
                        setTimeout(connectToPC, 3000);
                    });
                }
            });

            peer.on('error', (err) => {
                document.getElementById('status').innerText = "🔄 កុំព្យូទ័រមិនទាន់បើកទំព័រ Web ទេ! កំពុងរង់ចាំ...";
                setTimeout(connectToPC, 4000);
            });
        }

        function disconnectPhone() {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (localStream) localStream.getTracks().forEach(track => track.stop()); 
            
            document.getElementById('status').innerText = "🛑 បានបិទកាមេរ៉ារួចរាល់។";
            document.getElementById('view-video').srcObject = null;
        }
    </script>
</body>
</html>
