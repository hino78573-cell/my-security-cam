<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 ប្រព័ន្ធគ្រប់គ្រងកាមេរ៉ា (Smart Toggle & Auto-Clean)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #0d0e15; 
            overflow: hidden; 
            font-family: 'Khmer OS Battambang', sans-serif; 
        }

        /* 🖥️ ផ្ទាំងបញ្ជាកុំព្យូទ័រ */
        #pc-ui {
            width: 100%;
            height: 100%;
            display: none; 
            background-color: #0d0e15;
            position: relative;
        }

        /* 🎛️ របារបញ្ជីប៊ូតុងកាមេរ៉ា (ខាងឆ្វេងអេក្រង់) */
        .camera-sidebar {
            width: 260px;
            background: #11121a;
            border-right: 2px solid #1f202e;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 20;
        }

        .sidebar-title {
            color: #8be9fd;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #1f202e;
            padding-bottom: 10px;
        }

        #dynamic-btn-container {
            display: flex;
            flex-direction: column;
        }

        /* 🟢 ស្ទីលប៊ូតុងកាមេរ៉ា */
        .cam-btn {
            background: rgba(80, 250, 123, 0.03);
            color: #50fa7b;
            border: 2px solid #50fa7b; 
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 14px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(80, 250, 123, 0.15); 
            transition: all 0.3s ease-in-out;
            animation: popIn 0.4s ease-out; 
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .cam-btn:hover {
            background: rgba(80, 250, 123, 0.1);
            box-shadow: 0 0 15px rgba(80, 250, 123, 0.3);
        }

        .cam-btn.active {
            background: #50fa7b !important;
            color: #11121a !important;
            box-shadow: 0 0 20px rgba(80, 250, 123, 0.5);
        }

        /* 🔴 ស្ទីលប៊ូតុងពេលយើងចុចបិទវីដេអូបណ្តោះអាសន្ន */
        .cam-btn.paused {
            border-color: #ffb86c !important;
            color: #ffb86c !important;
            background: rgba(255, 184, 108, 0.05) !important;
            box-shadow: 0 0 10px rgba(255, 184, 108, 0.2) !important;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #50fa7b;
            border-radius: 50%;
            box-shadow: 0 0 8px #50fa7b;
        }

        .cam-btn.paused .status-dot {
            background: #ffb86c !important;
            box-shadow: 0 0 8px #ffb86c !important;
        }

        /* 📺 តំបន់បង្ហាញវីដេអូ */
        .video-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* 📺 អេក្រង់ទូរទស្សន៍ដាច់ប៉ុស្តិ៍ពិតៗ (Canvas) */
        #tv-static-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .tv-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        video { 
            height: 100vh;      
            width: auto;        
            object-fit: contain; 
            background: #000; 
            display: none; 
            position: relative;
            z-index: 5; 
        }

        #status { 
            position: absolute; 
            color: #ff5555; 
            font-weight: bold; 
            font-size: 18px; 
            text-align: center; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.85); 
            padding: 15px 25px; 
            border-radius: 8px; 
            pointer-events: none;
            border: 1px solid rgba(255, 85, 85, 0.3);
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.2);
        }

        /* ------------------ ផ្ទាំងចាក់សោរ PIN ------------------ */
        #login-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background-color: #1e1e2e;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 320px;
            transition: 0.3s;
            color: white;
        }

        .icon-lock { font-size: 50px; margin-bottom: 10px; color: #ffb86c; display: inline-block; }
        h2 { margin: 10px 0 20px 0; font-size: 22px; font-weight: 500; }
        .input-group { position: relative; margin-bottom: 20px; }

        input[type="password"] {
            width: 100%; padding: 15px; box-sizing: border-box; background: #282a36;
            border: 2px solid #44475a; border-radius: 12px; color: white;
            font-size: 20px; letter-spacing: 5px; text-align: center; outline: none;
        }
        input[type="password"]:focus { border-color: #8be9fd; }

        #login-btn {
            width: 100%; padding: 15px; background: #50fa7b; color: #282a36;
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        #status-text { margin-top: 20px; font-size: 16px; font-weight: bold; color: #ffb86c; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .error-shake { animation: shake 0.2s ease-in-out 2; border-color: #ff5555 !important; }
        .fade-out { opacity: 0; transform: scale(0.9); transition: 0.6s ease-out; }

        /* 📱 ស្ទីលសម្រាប់ទូរសព្ទឱ្យងងឹតឈឹងភ្លាមៗ */
        .phone-stealth-mode { background: #000000 !important; }
        .phone-stealth-mode #pc-ui { display: none !important; }
        .phone-stealth-mode #login-container { display: none !important; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box" id="login-card">
            <div class="icon-lock" id="lock-icon">🔒</div>
            <h2 id="title-text">វាយលេខកូដដើម្បីចូលមើល</h2>
            <div class="input-group">
                <input type="password" id="pin-input" placeholder="••••" maxlength="8" onkeypress="checkEnter(event)">
            </div>
            <button id="login-btn" onclick="verifyPIN()">ផ្ទៀងផ្ទាត់ 🔓</button>
            <div id="status-text">ប្រព័ន្ធត្រូវបានចាក់សោរ</div>
        </div>
    </div>

    <div id="pc-ui">
        <div class="camera-sidebar">
            <div class="sidebar-title">📹 កាមេរ៉ាអនឡាញ</div>
            <div id="dynamic-btn-container"></div>
        </div>

        <div class="video-container">
            <canvas id="tv-static-canvas"></canvas>
            <div class="tv-overlay"></div>
            
            <div id="status">📡 ប្រព័ន្ធរួចរាល់។ រង់ចាំទូរសព្ទបើកកាមេរ៉ាភ្ជាប់មក...</div>
            
            <video id="view-video" autoplay playsinline muted></video>
        </div>
    </div>

    <script>
        const CORRECT_PIN = "2011"; 
        const pinInput = document.getElementById('pin-input');
        const loginCard = document.getElementById('login-card');
        const loginContainer = document.getElementById('login-container');
        const statusText = document.getElementById('status-text');
        const pcUi = document.getElementById('pc-ui');
        const videoElement = document.getElementById('view-video');
        const statusElement = document.getElementById('status');
        const btnContainer = document.getElementById('dynamic-btn-container');

        const SERVER_ID = 'hino-cambodia-main-server'; 
        const CAM_PREFIX = 'hino-cambodia-secure-cam-';
        
        let activeCameraId = null; 
        let isVideoPlaying = false; // ត្រួតពិនិត្យស្ថានភាព ចុចបើក/ចុចបិទ
        let peer = null;
        let isMobile = false;
        let localStream = null;
        
        // វត្ថុសម្រាប់ផ្ទុកទិន្នន័យចាំបាច់របស់កាមេរ៉ានីមួយៗ
        let cameraRegistry = {}; 

        let canvas, ctx, animationFrameId;

        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'turn:139.59.245.105:3478?transport=udp', username: 'hino_security', credential: 'secure_password_2026' },
                    { urls: 'turn:139.59.245.105:3478?transport=tcp', username: 'hino_security', credential: 'secure_password_2026' }
                ],
                iceTransportPolicy: 'all'
            }
        };

        window.onload = function() {
            isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                pinInput.focus();
                // បង្កើតការត្រួតពិនិត្យមើលទូរសព្ទណាដែលដាច់ការទាក់ទងរៀងរាល់ ២ វិនាទីម្តង
                setInterval(checkDeadCameras, 2000);
            } else {
                document.body.classList.add('phone-stealth-mode');
                const urlParams = new URLSearchParams(window.location.search);
                const camId = urlParams.get('cam') || '1'; 
                startCamera(camId);
            }
        };

        function verifyPIN() {
            if (pinInput.value === CORRECT_PIN) {
                statusText.innerText = "🔓 ត្រឹមត្រូវ! កំពុងចូល...";
                statusText.style.color = "#50fa7b";
                setTimeout(() => {
                    loginCard.classList.add('fade-out');
                    setTimeout(() => {
                        loginContainer.style.display = 'none'; 
                        pcUi.style.display = 'flex';   
                        initTVStatic();
                        initPCServerListener(); 
                    }, 600);
                }, 500);
            } else {
                statusText.innerText = "❌ លេខកូដមិនត្រឹមត្រូវទេ!";
                statusText.style.color = "#ff5555";
                loginCard.classList.add('error-shake');
                pinInput.value = ""; pinInput.focus();
                setTimeout(() => { loginCard.classList.remove('error-shake'); }, 400);
            }
        }
        function checkEnter(event) { if (event.key === "Enter") { verifyPIN(); } }

        function initTVStatic() {
            canvas = document.getElementById('tv-static-canvas');
            ctx = canvas.getContext('2d');
            function resize() {
                canvas.width = canvas.offsetWidth / 2;
                canvas.height = canvas.offsetHeight / 2;
            }
            window.addEventListener('resize', resize);
            resize();

            function renderNoise() {
                const width = canvas.width;
                const height = canvas.height;
                const imgData = ctx.createImageData(width, height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const noise = Math.random() * 255;
                    data[i] = noise; data[i+1] = noise; data[i+2] = noise; data[i+3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
                animationFrameId = requestAnimationFrame(renderNoise);
            }
            renderNoise();
        }

        // --- 🖥️ ផ្នែកកុំព្យូទ័រ (SERVER LISTENER) ---
        function initPCServerListener() {
            if (peer) peer.destroy();
            peer = new Peer(SERVER_ID, peerConfig);
            
            peer.on('open', () => {
                statusElement.innerText = "📡 ប្រព័ន្ធរួចរាល់។ រង់ចាំទូរសព្ទបើកកាមេរ៉ាភ្ជាប់មក...";
            });

            peer.on('call', (call) => {
                const incomingCamId = call.peer.replace(CAM_PREFIX, '');
                
                // កត់ត្រាពេលវេលាដែលបានបាញ់សញ្ញាមកចុងក្រោយបង្អស់ (Keep-Alive)
                if (!cameraRegistry[incomingCamId]) {
                    cameraRegistry[incomingCamId] = {
                        lastSeen: Date.now(),
                        stream: null
                    };
                    createCameraButton(incomingCamId);
                } else {
                    cameraRegistry[incomingCamId].lastSeen = Date.now();
                }

                call.answer();
                
                call.on('stream', (remoteStream) => {
                    cameraRegistry[incomingCamId].stream = remoteStream;
                    
                    // បង្ហាញវីដេអូភ្លាមបើកាមេរ៉ានេះកំពុងត្រូវបានជ្រើសរើស និងបើកមើល
                    if (activeCameraId === incomingCamId && isVideoPlaying) {
                        statusElement.style.display = 'none';
                        videoElement.style.display = 'block';
                        if (videoElement.srcObject !== remoteStream) {
                            videoElement.srcObject = remoteStream;
                            videoElement.play().catch(e => {});
                        }
                    }
                });
            });
        }

        function createCameraButton(camId) {
            const newBtn = document.createElement('button');
            newBtn.className = 'cam-btn';
            newBtn.id = 'btn-cam' + camId;
            newBtn.innerHTML = `<span>Camera ${camId} 📷</span> <div class="status-dot"></div>`;
            
            newBtn.onclick = function() {
                handleButtonClick(camId);
            };

            btnContainer.appendChild(newBtn);

            // បើជាកាមេរ៉ាដំបូងចូលមក ឱ្យវាដើរអូតូហ្មង
            if (activeCameraId === null) {
                activeCameraId = camId;
                isVideoPlaying = true;
                document.querySelectorAll('.cam-btn').forEach(btn => btn.classList.remove('active', 'paused'));
                newBtn.classList.add('active');
            }
        }

        // ឡូហ្សិក៖ ចុចមួយបើក ចុចមួយបិទ (Toggle)
        function handleButtonClick(camId) {
            const clickedBtn = document.getElementById('btn-cam' + camId);
            
            if (activeCameraId === camId) {
                // បើចុចចំកាមេរ៉ាដែលកំពុងមើលដដែល គឺស្មើនឹង "បិទ / ផ្អាកមើល"
                if (isVideoPlaying) {
                    isVideoPlaying = false;
                    clickedBtn.classList.remove('active');
                    clickedBtn.classList.add('paused');
                    
                    // បង្ហាញអេក្រង់ដាច់ប៉ុស្តិ៍
                    videoElement.style.display = 'none';
                    videoElement.srcObject = null;
                    statusElement.style.display = 'block';
                    statusElement.style.color = '#ffb86c';
                    statusElement.innerText = `⏸️ បានផ្អាកការមើលកាមេរ៉ាទី ${camId} (ចុចម្តងទៀតដើម្បីបើក)`;
                } else {
                    // បើកំពុងបិទ រួចចុចម្តងទៀត គឺ "បើកមើលវិញ"
                    isVideoPlaying = true;
                    clickedBtn.classList.remove('paused');
                    clickedBtn.classList.add('active');
                    
                    if (cameraRegistry[camId] && cameraRegistry[camId].stream) {
                        statusElement.style.display = 'none';
                        videoElement.style.display = 'block';
                        videoElement.srcObject = cameraRegistry[camId].stream;
                        videoElement.play().catch(e => {});
                    }
                }
            } else {
                // បើចុចរើសកាមេរ៉ាផ្សេងផ្សេងទៀត
                activeCameraId = camId;
                isVideoPlaying = true;
                
                document.querySelectorAll('.cam-btn').forEach(btn => btn.classList.remove('active', 'paused'));
                if(clickedBtn) clickedBtn.classList.add('active');

                if (cameraRegistry[camId] && cameraRegistry[camId].stream) {
                    statusElement.style.display = 'none';
                    videoElement.style.display = 'block';
                    videoElement.srcObject = cameraRegistry[camId].stream;
                    videoElement.play().catch(e => {});
                } else {
                    videoElement.style.display = 'none';
                    videoElement.srcObject = null;
                    statusElement.style.display = 'block';
                    statusElement.style.color = '#ffb86c';
                    statusElement.innerText = `📡 NO SIGNAL៖ កំពុងរង់ចាំសញ្ញាពីកាមេរ៉ាទី ${camId}...`;
                }
            }
        }

        // មុខងារត្រួតពិនិត្យ និងលុបប៊ូតុងកាមេរ៉ាណាដែលឈប់ភ្ជាប់ (Auto-Remove)
        function checkDeadCameras() {
            const now = Date.now();
            for (const camId in cameraRegistry) {
                // បើលើសពី ៦ វិនាទី អត់ឃើញបាញ់សញ្ញាមកទេ គឺចាត់ទុកថាដាច់ការតភ្ជាប់ហើយ (ទូរសព្ទបិទចោល)
                if (now - cameraRegistry[camId].lastSeen > 6000) {
                    
                    // លុបប៊ូតុងចេញពី UI ភ្លាម
                    const btnToRemove = document.getElementById('btn-cam' + camId);
                    if (btnToRemove) {
                        btnToRemove.remove();
                    }

                    // បើកាមេរ៉ាដែលដាច់ហ្នឹង ជាកាមេរ៉ាដែលយើងកំពុងមើល ត្រូវឱ្យអេក្រង់ទៅជាទំនេរវិញ
                    if (activeCameraId === camId) {
                        activeCameraId = null;
                        isVideoPlaying = false;
                        videoElement.style.display = 'none';
                        videoElement.srcObject = null;
                        statusElement.style.display = 'block';
                        statusElement.style.color = '#ff5555';
                        statusElement.innerText = `⚠️ SIGNAL LOST៖ កាមេរ៉ាទី ${camId} បានដាច់ទាំងស្រុង និងលុបចេញពីប្រព័ន្ធ។`;
                    }

                    // លុបចេញពីបញ្ជី Registry
                    delete cameraRegistry[camId];
                }
            }
        }

        // --- 📱 ផ្នែកទូរសព្ទ (CAMERA STREAMER) ---
        function startCamera(camId) {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 15 } },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC(camId);
            })
            .catch((err) => { 
                alert("សូមអនុញ្ញាតឱ្យប្រើប្រាស់កាមេរ៉ាសិន!");
                setTimeout(() => startCamera(camId), 5000); 
            });
        }

        function connectToPC(camId) {
            if (peer) peer.destroy();
            peer = new Peer(CAM_PREFIX + camId, peerConfig); 

            peer.on('open', (id) => {
                // បាញ់វីដេអូទៅកាន់កុំព្យូទ័ររៀងរាល់ ២.៥ វិនាទីម្តង ដើម្បីធ្វើជាសញ្ញាប្រាប់ថាទូរសព្ទនៅរស់ (Keep-Alive)
                setInterval(() => {
                    if(!peer.destroyed && localStream) {
                        peer.call(SERVER_ID, localStream);
                    }
                }, 2500);
            });

            peer.on('error', (err) => { 
                setTimeout(() => connectToPC(camId), 4000); 
            });
        }
    </script>
</body>
</html>
